name: CI/CD Pipeline

on:
  push:
    branches:
      - main        # triggers on every push to main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest    # GitHub runs this on their server

    steps:
      # Step 1 - checkout your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - run tests
      - name: Run tests
        run: |
          cd app
          npm install
          npm test

      # Step 3 - login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4 - build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-app:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-app:${{ github.sha }} .

      # Step 5 - push to Docker Hub
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-app:${{ github.sha }}

      # Step 6 - confirm deployment
      - name: Done
        run: echo "Image pushed to Docker Hub successfully!"
